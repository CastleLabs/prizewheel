<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prize Wheel System - CRITICAL FIXES Applied</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: none;
        }

        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            z-index: 1;
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; 
        }

        .wheel-container {
            position: relative;
            width: 95vmin;
            height: 95vmin;
            filter: drop-shadow(0 15px 40px rgba(0, 0, 0, 0.4));
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .pointer {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 35px solid transparent;
            border-right: 35px solid transparent;
            border-top: 70px solid #FFD700;
            filter: drop-shadow(0 6px 12px rgba(255, 215, 0, 0.6));
            z-index: 10;
            animation: pointerGlow 2s infinite alternate;
        }

        @keyframes pointerGlow {
            from {
                filter: drop-shadow(0 6px 12px rgba(255, 215, 0, 0.6));
            }
            to {
                filter: drop-shadow(0 8px 16px rgba(255, 215, 0, 0.9));
            }
        }

        .controls {
            display: flex;
            justify-content: center;
            position: absolute;
            bottom: 30px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover:before {
            left: 100%;
        }

        .btn-spin {
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF8C00);
            color: #333;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
            border: 3px solid #FFE55C;
        }

        .btn-spin:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.7);
        }

        .btn-spin:active:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
        }

        .btn-spin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.4; }
            100% { opacity: 0.6; }
        }

        .status-indicator {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .status-ready {
            color: #4CAF50;
            animation: readyPulse 2s infinite;
        }

        .status-spinning {
            color: #FF9800;
            animation: spinPulse 0.8s infinite;
        }

        .status-cooldown {
            color: #F44336;
            animation: cooldownPulse 1s infinite;
        }

        @keyframes readyPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        @keyframes spinPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes cooldownPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .volume-control {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .volume-control label {
            font-size: 16px;
            margin-right: 10px;
        }

        .volume-slider {
            width: 120px;
            height: 6px;
            background: linear-gradient(to right, #667eea, #764ba2);
            border-radius: 3px;
            outline: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .volume-slider:hover {
            opacity: 1;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #FFD700;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .volume-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #FFD700;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            border: none;
        }

        .winner-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .winner-content {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            max-width: 600px;
            animation: winnerAppear 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            border: 3px solid rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .winner-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,215,0,0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes winnerAppear {
            from {
                transform: scale(0) rotate(180deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .winner-title {
            font-size: 3em;
            margin-bottom: 25px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            z-index: 1;
            position: relative;
        }

        .winner-title.winner {
            color: #FFD700;
            animation: celebrateBounce 1.2s infinite;
        }

        .winner-title.loser {
            color: #F44336;
            animation: disappointmentShake 0.8s infinite;
        }

        @keyframes celebrateBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-8px); }
        }

        @keyframes disappointmentShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .winner-name {
            font-size: 3.5em;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            margin: 25px 0;
            background: linear-gradient(45deg, #667eea, #764ba2, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradientShift 3s ease-in-out infinite;
            z-index: 1;
            position: relative;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .winner-description {
            font-size: 1.4em;
            color: #555;
            margin: 25px 0;
            font-weight: 500;
            z-index: 1;
            position: relative;
        }

        .confetti {
            position: fixed;
            z-index: 999;
            opacity: 1;
            transition: transform 5s ease-out, opacity 5s ease-out;
            border-radius: 50%;
        }

        .sparkle {
            position: fixed;
            z-index: 998;
            width: 4px;
            height: 4px;
            background: #FFD700;
            border-radius: 50%;
            animation: sparkleFloat 3s infinite;
        }

        @keyframes sparkleFloat {
            0%, 100% { opacity: 0; transform: translateY(0) rotate(0deg); }
            50% { opacity: 1; transform: translateY(-20px) rotate(180deg); }
        }

        .firework {
            position: fixed;
            z-index: 997;
            pointer-events: none;
        }

        .firework::before {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            animation: fireworkBurst 1s ease-out forwards;
        }

        @keyframes fireworkBurst {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(20);
                opacity: 0;
            }
        }

        .hardware-accelerated {
            transform: translateZ(0);
            will-change: transform;
        }

        .fix-indicator {
            position: absolute;
            bottom: 25px;
            left: 25px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .wheel-container {
                width: 90vmin;
                height: 90vmin;
            }
            
            .controls {
                bottom: 20px;
            }
            
            .btn {
                padding: 15px 35px;
                font-size: 18px;
            }

            .status-indicator {
                top: 15px;
                right: 15px;
                padding: 12px 20px;
                font-size: 14px;
            }

            .volume-control {
                top: 15px;
                left: 15px;
                padding: 12px;
            }

            .volume-slider {
                width: 80px;
            }

            .winner-content {
                margin: 20px;
                padding: 35px;
            }

            .winner-title {
                font-size: 2.5em;
            }

            .winner-name {
                font-size: 2.8em;
            }
        }

        @media (max-width: 480px) {
            .wheel-container {
                width: 85vmin;
                height: 85vmin;
            }

            .winner-content {
                padding: 25px;
            }

            .winner-title {
                font-size: 2em;
            }

            .winner-name {
                font-size: 2.2em;
            }
        }

        /* Accessibility improvements */
        @media (prefers-reduced-motion: reduce) {
            .btn-spin:hover:not(:disabled) {
                transform: none;
                animation: none;
            }
            
            .winner-title.winner,
            .winner-title.loser {
                animation: none;
            }
            
            .confetti,
            .sparkle,
            .firework {
                display: none;
            }
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .winner-content {
                border: 3px solid #000;
            }
            
            .status-indicator,
            .volume-control {
                border: 2px solid #000;
            }
        }
    </style>
</head>
<body>
    <div class="fix-indicator">Server Winner Logic ✓</div> <div class="main-container">
        <div class="wheel-section">
            <div class="wheel-container hardware-accelerated">
                <div class="pointer"></div>
                <canvas id="wheelCanvas"></canvas>
            </div>

            <div class="controls">
                <button class="btn btn-spin" id="spinBtn" onclick="spinWheel()" aria-label="Spin the prize wheel">
                    <span id="buttonText">Spin Wheel</span>
                </button>
            </div>
        </div>
    </div>

    <div class="status-indicator" id="statusIndicator" aria-live="polite">
        <span id="statusText">Ready to Spin!</span>
    </div>

    <div class="volume-control" aria-label="Volume control">
        <label for="volumeSlider">🔊</label> <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="0.7" aria-label="Master volume">
    </div>

    <div class="winner-modal" id="winnerModal" role="dialog" aria-modal="true" aria-labelledby="winnerTitle">
        <div class="winner-content">
            <div class="winner-title" id="winnerTitle"></div>
            <div class="winner-name" id="winnerName"></div>
            <div class="winner-description" id="winnerDescription"></div>
        </div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="/static/sounds/spin.mp3" type="audio/mpeg">
        <source src="/static/sounds/spin.wav" type="audio/wav">
        <source src="/static/sounds/spin.ogg" type="audio/ogg">
    </audio>

    <audio id="winnerSound" preload="auto">
        <source src="/static/sounds/winner.mp3" type="audio/mpeg">
        <source src="/static/sounds/winner.wav" type="audio/wav">
    </audio>

    <audio id="loserSound" preload="auto">
        <source src="/static/sounds/loser.mp3" type="audio/mpeg">
        <source src="/static/sounds/loser.wav" type="audio/wav">
    </audio>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // CRITICAL FIXES APPLIED: Prize Wheel Display System v2.1
        // ### FIX APPLIED ### - Corrected character encoding for all console logs and UI text
        console.log('🎰 Prize Wheel Display System v2.1 - CRITICAL FIXES & IMPROVEMENTS APPLIED');
        console.log('✅ Server-side winner determination implemented');
        console.log('✅ Client-side cooldown now synchronized with server');

        // Prize data from server (Flask template injection)
        const prizes = {{ prizes | tojson }};
        console.log('📋 Loaded prizes:', prizes.length);
        
        // Enhanced audio management system
        const audioElements = {
            spin: document.getElementById('spinSound'),
            winner: document.getElementById('winnerSound'),
            loser: document.getElementById('loserSound')
        };
        
        const volumeSlider = document.getElementById('volumeSlider');
        let masterVolume = 0.7;
        let prizeAudioCache = new Map();

        // CRITICAL FIX: Server-coordinated wheel state management
        let currentRotation = 0;
        let isSpinning = false;
        let spinStartTime = null;
        let targetRotation = 0;
        let spinAnimationId = null;
        let modalCloseTimer = null;
        let countdownInterval = null; // IMPROVEMENT: For cooldown timer

        // CRITICAL FIX: Server-provided spin parameters (received from server)
        let serverSpinDuration = 4000;
        let serverWinnerIndex = 0;
        let serverWinnerData = null;

        // Enhanced volume control
        volumeSlider.addEventListener('input', (e) => {
            masterVolume = parseFloat(e.target.value);
            updateAudioVolumes();
        });

        function updateAudioVolumes() {
            Object.values(audioElements).forEach(audio => {
                audio.volume = masterVolume;
            });
            prizeAudioCache.forEach(audio => {
                audio.volume = masterVolume;
            });
        }

        // Preload and cache prize sounds
        function preloadPrizeSounds() {
            prizes.forEach(prize => {
                if (prize.sound_path) {
                    const audio = new Audio(`/static/${prize.sound_path}`);
                    audio.volume = masterVolume;
                    audio.preload = 'auto';
                    prizeAudioCache.set(prize.id, audio);
                }
            });
            console.log('🔊 Preloaded prize sounds:', prizeAudioCache.size);
        }

        function playSound(type, prizeId = null) {
            try {
                if (prizeId && prizeAudioCache.has(prizeId)) {
                    const audio = prizeAudioCache.get(prizeId);
                    audio.currentTime = 0;
                    const playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => console.log('Audio play failed:', error));
                    }
                } else if (audioElements[type]) {
                    audioElements[type].currentTime = 0;
                    const playPromise = audioElements[type].play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => console.log('Audio play failed:', error));
                    }
                }
            } catch (error) {
                console.log('Audio error:', error);
            }
        }

        function stopSound(type) {
            try {
                if (audioElements[type]) {
                    audioElements[type].pause();
                    audioElements[type].currentTime = 0;
                }
            } catch (error) {
                console.log('Audio stop failed:', error);
            }
        }

        // Enhanced canvas setup with high DPI support
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dynamic wheel size variables
        let centerX, centerY, radius;
        let pixelRatio = Math.min(window.devicePixelRatio || 1, 2);

        // Socket.IO connection with enhanced error handling
        const socket = io({
            transports: ['websocket', 'polling'],
            timeout: 5000,
            forceNew: true
        });

        socket.on('connect', () => {
            console.log('✅ Connected to server with CRITICAL FIXES');
            updateStatus('ready');
        });

        socket.on('disconnect', () => {
            console.log('❌ Disconnected from server');
        });

        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
        });

        function setCanvasSize() {
            const container = document.querySelector('.wheel-container');
            const size = Math.min(container.clientWidth, container.clientHeight);
            
            canvas.width = size * pixelRatio;
            canvas.height = size * pixelRatio;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            
            ctx.scale(pixelRatio, pixelRatio);

            centerX = size / 2;
            centerY = size / 2;
            radius = size / 2 * 0.88;
        }

        // Enhanced wheel drawing with better graphics
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (prizes.length === 0) {
                ctx.fillStyle = '#666';
                ctx.font = `bold ${radius * 0.1}px Montserrat, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('No Prizes Available', centerX, centerY);
                return;
            }

            const numPrizes = prizes.length;
            const anglePerPrize = (Math.PI * 2) / numPrizes;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(currentRotation);

            prizes.forEach((prize, index) => {
                const startAngle = index * anglePerPrize;
                const endAngle = (index + 1) * anglePerPrize;
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
                gradient.addColorStop(0, prize.color);
                gradient.addColorStop(1, adjustBrightness(prize.color, -20));
                ctx.beginPath();
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.lineTo(0, 0);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.lineTo(0, 0);
                ctx.closePath();
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.save();
                ctx.rotate(startAngle + anglePerPrize / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = `800 ${Math.max(10, radius * 0.06)}px Montserrat, sans-serif`;
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                const maxNameLength = Math.floor(radius / 12);
                const displayName = prize.name.length > maxNameLength ?
                    prize.name.substring(0, maxNameLength) + '...' : prize.name;
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 3;
                ctx.strokeText(displayName, radius * 0.88, 6);
                ctx.fillText(displayName, radius * 0.88, 6);
                ctx.restore();
            });

            const centerCircleRadius = radius * 0.18;
            const centerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, centerCircleRadius);
            centerGradient.addColorStop(0, '#fff');
            centerGradient.addColorStop(1, '#f0f0f0');
            ctx.beginPath();
            ctx.arc(0, 0, centerCircleRadius, 0, Math.PI * 2);
            ctx.fillStyle = centerGradient;
            ctx.fill();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, centerCircleRadius * 0.8, 0, Math.PI * 2);
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.font = `800 ${centerCircleRadius * 0.45}px Montserrat, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'transparent';
            ctx.fillText('SPIN', 0, -2);
            ctx.restore();
        }

        // Color utility function
        function adjustBrightness(color, percent) {
            const num = parseInt(color.replace("#", ""), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
        }

        // CRITICAL FIX: Enhanced spin animation with server-coordinated targeting
        function animateSpin(timestamp) {
            if (!isSpinning) return;
            if (!spinStartTime) spinStartTime = timestamp;
            const elapsed = timestamp - spinStartTime;
            const progress = Math.min(elapsed / serverSpinDuration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 5);
            currentRotation = targetRotation * easeOut;
            drawWheel();
            if (progress < 1) {
                spinAnimationId = requestAnimationFrame(animateSpin);
            } else {
                completeSpinAnimation();
            }
        }

        function completeSpinAnimation() {
            isSpinning = false;
            spinStartTime = null;
            stopSound('spin');
            console.log('🎯 Spin complete - Server determined winner:', serverWinnerData?.name);
            if (serverWinnerData) {
                if (serverWinnerData.is_winner) {
                    playSound('winner', serverWinnerData.id);
                } else {
                    playSound('loser', serverWinnerData.id);
                }
                setTimeout(() => {
                    showWinner(serverWinnerData);
                }, 500);
            }
        }

        function spinWheel() {
            if (isSpinning) return;
            const spinButton = document.getElementById('spinBtn');
            if (spinButton.disabled) return;
            if ('vibrate' in navigator) navigator.vibrate(50);
            fetch('/api/wheel/spin', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Spin error:', data.error);
                        updateStatus('error');
                        setTimeout(() => updateStatus('ready'), 2000);
                    }
                })
                .catch(error => {
                    console.error('Spin request failed:', error);
                    updateStatus('error');
                    setTimeout(() => updateStatus('ready'), 2000);
                });
        }

        function showWinner(winner) {
            const winnerTitleEl = document.getElementById('winnerTitle');
            if (winner.is_winner) {
                winnerTitleEl.innerHTML = '🏆 WINNER! 🏆';
                winnerTitleEl.className = 'winner-title winner';
                createCelebrationEffects();
            } else {
                winnerTitleEl.innerHTML = '😟 Oh No... 😟';
                winnerTitleEl.className = 'winner-title loser';
            }
            document.getElementById('winnerName').textContent = winner.name;
            document.getElementById('winnerDescription').textContent = winner.description || '';
            document.getElementById('winnerModal').style.display = 'flex';
            modalCloseTimer = setTimeout(closeWinnerModal, 12000);
            if ('speechSynthesis' in window) {
                const announcement = winner.is_winner ? 
                    `Winner! ${winner.name}` : 
                    `${winner.name}. ${winner.description}`;
                const utterance = new SpeechSynthesisUtterance(announcement);
                utterance.volume = masterVolume * 0.8;
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            }
        }

        // Enhanced celebration effects
        function createCelebrationEffects() {
            createConfetti();
            createSparkles();
            createFireworks();
        }

        function createConfetti() {
            const confettiContainer = document.body;
            const colors = ['#FFD700', '#FF6B6B', '#4CAF50', '#2196F3', '#9C27B0', '#FF9800', '#00BCD4', '#FFC107'];
            for (let i = 0; i < 120; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti hardware-accelerated';
                const color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.background = color;
                const size = Math.random() * 12 + 6;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.top = '50%';
                confetti.style.left = '50%';
                confetti.style.transform = 'translate(-50%, -50%)';
                const endX = (Math.random() - 0.5) * (window.innerWidth * 2);
                const endY = (Math.random() - 0.5) * (window.innerHeight * 2);
                const rotation = Math.random() * 720;
                const delay = Math.random() * 500;
                confettiContainer.appendChild(confetti);
                setTimeout(() => {
                    confetti.style.transform = `translate(calc(-50% + ${endX}px), calc(-50% + ${endY}px)) rotate(${rotation}deg)`;
                    confetti.style.opacity = '0';
                }, delay);
                setTimeout(() => {
                    confetti.remove();
                }, 5000 + delay);
            }
        }

        function createSparkles() {
            for (let i = 0; i < 30; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle hardware-accelerated';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 3000);
            }
        }

        function createFireworks() {
            for (let i = 0; i < 8; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework hardware-accelerated';
                firework.style.top = Math.random() * 50 + 25 + '%';
                firework.style.left = Math.random() * 50 + 25 + '%';
                firework.style.animationDelay = Math.random() * 1000 + 'ms';
                document.body.appendChild(firework);
                setTimeout(() => firework.remove(), 2000);
            }
        }

        function closeWinnerModal() {
            clearTimeout(modalCloseTimer);
            document.getElementById('winnerModal').style.display = 'none';
            document.querySelectorAll('.confetti, .sparkle, .firework').forEach(el => el.remove());
        }

        // IMPROVEMENT: Update status function with cooldown timer
        function updateStatus(status, duration = 0) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            const button = document.getElementById('spinBtn');
            const buttonText = document.getElementById('buttonText');
            
            indicator.className = 'status-indicator';
            clearInterval(countdownInterval);
            
            switch(status) {
                case 'ready':
                    indicator.classList.add('status-ready');
                    text.textContent = '✅ Ready to Spin!';
                    button.disabled = false;
                    buttonText.textContent = 'Spin Wheel';
                    break;
                case 'spinning':
                    indicator.classList.add('status-spinning');
                    text.textContent = '🌀 Spinning...';
                    button.disabled = true;
                    buttonText.textContent = 'Spinning...';
                    break;
                case 'cooldown':
                    indicator.classList.add('status-cooldown');
                    button.disabled = true;
                    buttonText.textContent = 'Please Wait...';
                    let countdown = Math.ceil(duration);
                    text.textContent = `⏳ Cooldown (${countdown}s)`;
                    countdownInterval = setInterval(() => {
                        countdown--;
                        if (countdown > 0) {
                            text.textContent = `⏳ Cooldown (${countdown}s)`;
                        } else {
                            clearInterval(countdownInterval);
                        }
                    }, 1000);
                    break;
                case 'error':
                    indicator.classList.add('status-cooldown');
                    text.textContent = '❌ Error - Try Again';
                    button.disabled = false;
                    buttonText.textContent = 'Try Again';
                    break;
            }
        }

        socket.on('spin_started', (data) => {
            console.log('🎯 CRITICAL FIX: Server spin started with comprehensive data:', data);
            if (isSpinning) return;
            isSpinning = true;
            updateStatus('spinning');
            playSound('spin');
            serverSpinDuration = data.spin_duration || 4000;
            serverWinnerIndex = data.winner_index || 0;
            if (data.winner_id) {
                serverWinnerData = prizes.find(p => p.id === data.winner_id) || prizes[serverWinnerIndex] || prizes[0];
            } else {
                serverWinnerData = prizes[serverWinnerIndex] || prizes[0];
            }
            console.log('🎯 Server determined winner:', serverWinnerData?.name, 'at index:', serverWinnerIndex);
            const numPrizes = prizes.length;
            const anglePerPrize = (Math.PI * 2) / numPrizes;
            const winnerAngle = serverWinnerIndex * anglePerPrize + anglePerPrize / 2;
            const spins = 5 + Math.random() * 4;
            targetRotation = (spins * Math.PI * 2) - winnerAngle + (Math.PI / 2);
            const segmentRandomness = (Math.random() - 0.5) * anglePerPrize * 0.3;
            targetRotation += segmentRandomness;
            requestAnimationFrame(animateSpin);
        });

        // IMPROVEMENT: Use cooldown duration from server
        socket.on('spin_complete', (data) => {
            console.log('🏁 Server spin complete:', data);
            const cooldown = data.cooldown_duration || 3000;
            updateStatus('cooldown', cooldown / 1000);
            
            setTimeout(() => {
                updateStatus('ready');
            }, cooldown);

            if (data.winner && serverWinnerData && data.winner.id !== serverWinnerData.id) {
                console.warn('⚠️ Winner mismatch detected - using server winner');
                serverWinnerData = data.winner;
            }
        });

        document.addEventListener('keydown', (e) => {
            const spinButton = document.getElementById('spinBtn');
            if ((e.code === 'Space' || e.code === 'Enter') && !spinButton.disabled) {
                e.preventDefault();
                spinWheel();
            } else if (e.code === 'Escape') {
                closeWinnerModal();
            }
        });

        let touchStartY = null;
        let touchStartTime = null;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        });
        document.addEventListener('touchend', (e) => {
            if (touchStartY === null) return;
            const touchEndY = e.changedTouches[0].clientY;
            const touchDuration = Date.now() - touchStartTime;
            const diff = touchStartY - touchEndY;
            const spinButton = document.getElementById('spinBtn');
            if (diff > 50 && touchDuration < 1000 && !spinButton.disabled) {
                spinWheel();
            }
            touchStartY = null;
            touchStartTime = null;
        });

        document.getElementById('winnerModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeWinnerModal();
        });

        function init() {
            console.log('🚀 Initializing Prize Wheel Display System v2.1 with CRITICAL FIXES...');
            setCanvasSize();
            drawWheel();
            preloadPrizeSounds();
            updateAudioVolumes();
            updateStatus('ready');
            console.log('🎉 Prize Wheel Display System v2.1 initialized successfully!');
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                setCanvasSize();
                drawWheel();
            }, 100);
        });
        
        document.addEventListener('DOMContentLoaded', init);

        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake lock acquired - screen will stay on');
                }
            } catch (err) {
                console.log('Wake lock failed:', err);
            }
        }
        document.addEventListener('DOMContentLoaded', requestWakeLock);
        document.addEventListener('visibilitychange', async () => {
            if (!document.hidden && wakeLock === null) await requestWakeLock();
        });
    </script>
</body>
</html>
